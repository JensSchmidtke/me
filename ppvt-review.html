<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PPVT Set Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0ede8; color: #222; }

  header { background: #fff; border-bottom: 1px solid #ddd; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header .count { font-size: 0.85rem; color: #888; }
  #save-btn { margin-left: auto; background: #b66a3c; color: #fff; border: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  #save-btn:hover { background: #9a5530; }
  #search-input { padding: 0.4rem 0.8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; width: 200px; }

  .sets-grid { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  .set-card { background: #fff; border-radius: 10px; padding: 1rem 1.2rem; display: flex; gap: 1rem; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .set-index { font-size: 0.75rem; color: #aaa; min-width: 28px; }
  .set-band { font-size: 0.7rem; font-weight: 600; background: #eee; border-radius: 4px; padding: 2px 6px; color: #666; min-width: 32px; text-align: center; }

  .img-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .img-slot img { width: 110px; height: 110px; object-fit: cover; border-radius: 8px; border: 3px solid transparent; display: block; }
  .img-slot.target img { border-color: #4a90d9; }
  .img-slot.distractor img { cursor: pointer; border-color: #ddd; }
  .img-slot.distractor img:hover { border-color: #b66a3c; }
  .img-slot span { font-size: 0.7rem; color: #888; max-width: 110px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .img-slot .slot-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; }

  .divider { font-size: 1.2rem; color: #ccc; }

  /* Picker overlay */
  #picker { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  #picker.open { display: flex; }
  #picker-inner { background: #fff; border-radius: 12px; width: 80vw; max-width: 900px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
  #picker-header { padding: 1rem 1.2rem; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 0.75rem; }
  #picker-header h2 { font-size: 1rem; font-weight: 600; }
  #picker-search { flex: 1; padding: 0.4rem 0.8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
  #picker-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; margin-left: auto; }
  #picker-grid { padding: 1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; overflow-y: auto; }
  .picker-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px; border-radius: 6px; border: 2px solid transparent; }
  .picker-item:hover { border-color: #b66a3c; background: #fdf5f0; }
  .picker-item img { width: 90px; height: 90px; object-fit: cover; border-radius: 6px; }
  .picker-item span { font-size: 0.65rem; color: #666; text-align: center; word-break: break-all; }
</style>
</head>
<body>

<header>
  <h1>PPVT Set Review</h1>
  <span class="count" id="set-count"></span>
  <input type="text" id="search-input" placeholder="Filter by word…"/>
  <button id="save-btn" onclick="saveJSON()">Download updated JSON</button>
</header>

<div class="sets-grid" id="sets-grid"></div>

<!-- Image picker -->
<div id="picker">
  <div id="picker-inner">
    <div id="picker-header">
      <h2>Pick replacement image</h2>
      <input type="text" id="picker-search" placeholder="Search images…" oninput="filterPicker(this.value)"/>
      <button id="picker-close" onclick="closePicker()">✕</button>
    </div>
    <div id="picker-grid"></div>
  </div>
</div>

<script>
const TARGET_BASE = 'projects/ppvt-test/images/';
const DISTRACTOR_BASE = 'projects/ppvt-test/images/distractors/';
let sets = [];
let allDistractorImages = [];
let pickerTarget = null; // { setIdx, distractorIdx }

async function init() {
  const [setsRes, imgsRes] = await Promise.all([
    fetch('ppvt-review-data.json'),
    fetch(DISTRACTOR_BASE).then(r => r.text())
  ]);
  sets = await setsRes.json();

  // Parse directory listing to get distractor image filenames
  const parser = new DOMParser();
  const doc = parser.parseFromString(imgsRes, 'text/html');
  allDistractorImages = Array.from(doc.querySelectorAll('a[href]'))
    .map(a => a.getAttribute('href'))
    .filter(h => /\.(jpg|jpeg|png|gif|webp)$/i.test(h))
    .map(h => h.split('/').pop());

  document.getElementById('set-count').textContent = `${sets.length} sets`;
  renderAll();
  buildPickerGrid(allDistractorImages);
}

function renderAll(filter = '') {
  const grid = document.getElementById('sets-grid');
  const lower = filter.toLowerCase();
  grid.innerHTML = '';
  sets.forEach((s, si) => {
    if (lower && !s.target.word.toLowerCase().includes(lower)) return;
    grid.appendChild(makeCard(s, si));
  });
}

function imgPath(imageField, isTarget) {
  if (isTarget) return TARGET_BASE + encodeURIComponent(imageField);
  // distractor image field is e.g. "distractors/Gleis.jpg" — strip the prefix
  const filename = imageField.replace(/^distractors\//, '');
  return DISTRACTOR_BASE + encodeURIComponent(filename);
}

function makeCard(s, si) {
  const card = document.createElement('div');
  card.className = 'set-card';
  card.dataset.si = si;

  card.innerHTML = `<span class="set-index">${si + 1}</span>
    <span class="set-band">${s.target.band || ''}</span>`;

  // Target slot
  card.appendChild(makeSlot(s.target.image, s.target.word, true, null, null));

  const div = document.createElement('span');
  div.className = 'divider';
  div.textContent = '→';
  card.appendChild(div);

  // Distractor slots
  s.distractors.forEach((d, di) => {
    card.appendChild(makeSlot(d.image, d.word, false, si, di));
  });

  return card;
}

function makeSlot(image, word, isTarget, si, di) {
  const slot = document.createElement('div');
  slot.className = `img-slot ${isTarget ? 'target' : 'distractor'}`;
  const label = document.createElement('span');
  label.className = 'slot-label';
  label.textContent = isTarget ? 'target' : `distractor ${di + 1}`;
  const img = document.createElement('img');
  img.src = imgPath(image, isTarget);
  img.alt = word;
  const name = document.createElement('span');
  name.textContent = word;
  slot.appendChild(label);
  slot.appendChild(img);
  slot.appendChild(name);
  if (!isTarget) {
    img.title = 'Click to replace';
    img.onclick = () => openPicker(si, di);
  }
  return slot;
}

function buildPickerGrid(images) {
  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';
  images.forEach(filename => {
    const item = document.createElement('div');
    item.className = 'picker-item';
    item.dataset.name = filename.toLowerCase();
    const img = document.createElement('img');
    img.src = imgPath(filename, false);
    img.loading = 'lazy';
    const span = document.createElement('span');
    span.textContent = filename.replace(/\.[^.]+$/, '');
    item.appendChild(img);
    item.appendChild(span);
    item.onclick = () => pickImage(filename);
    grid.appendChild(item);
  });
}

function filterPicker(q) {
  const lower = q.toLowerCase();
  document.querySelectorAll('.picker-item').forEach(el => {
    el.style.display = el.dataset.name.includes(lower) ? '' : 'none';
  });
}

function openPicker(si, di) {
  pickerTarget = { si, di };
  document.getElementById('picker-search').value = '';
  filterPicker('');
  document.getElementById('picker').classList.add('open');
}

function closePicker() {
  document.getElementById('picker').classList.remove('open');
  pickerTarget = null;
}

function pickImage(filename) {
  if (!pickerTarget) return;
  const { si, di } = pickerTarget;
  sets[si].distractors[di].image = 'distractors/' + filename;
  sets[si].distractors[di].word = filename.replace(/\.[^.]+$/, '');
  // Re-render this card
  const card = document.querySelector(`.set-card[data-si="${si}"]`);
  if (card) card.replaceWith(makeCard(sets[si], si));
  closePicker();
}

function saveJSON() {
  const blob = new Blob([JSON.stringify(sets, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ppvt_sets.json';
  a.click();
}

document.getElementById('search-input').addEventListener('input', e => renderAll(e.target.value));
document.getElementById('picker').addEventListener('click', e => { if (e.target === document.getElementById('picker')) closePicker(); });

init();
</script>
</body>
</html>
